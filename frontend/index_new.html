<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ChatBot - AI Assistant</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --sidebar-width: 280px;
        --header-height: 60px;
        --primary: #10a37f;
        --primary-hover: #0d8c6f;
        --bg-main: #ffffff;
        --bg-secondary: #f7f7f8;
        --bg-tertiary: #ececf1;
        --text-primary: #202123;
        --text-secondary: #565869;
        --border: #d9d9e3;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      [data-theme="dark"] {
        --primary: #10a37f;
        --primary-hover: #19c992;
        --bg-main: #343541;
        --bg-secondary: #202123;
        --bg-tertiary: #2a2b32;
        --text-primary: #ececf1;
        --text-secondary: #c5c5d2;
        --border: #565869;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        background: var(--bg-main);
        color: var(--text-primary);
        height: 100vh;
        overflow: hidden;
      }

      .app-container {
        display: flex;
        height: 100vh;
        width: 100%;
      }

      /* Sidebar */
      .sidebar {
        width: var(--sidebar-width);
        background: var(--bg-secondary);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        transition: transform 0.3s ease;
        position: relative;
        z-index: 100;
      }

      .sidebar.hidden {
        transform: translateX(-100%);
      }

      .sidebar-header {
        padding: 16px;
        border-bottom: 1px solid var(--border);
      }

      .new-chat-btn {
        width: 100%;
        padding: 12px 16px;
        background: transparent;
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--text-primary);
        font-size: 14px;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 10px;
        transition: all 0.2s;
      }

      .new-chat-btn:hover {
        background: var(--bg-tertiary);
      }

      .sidebar-content {
        flex: 1;
        overflow-y: auto;
        padding: 16px;
      }

      .sidebar-section {
        margin-bottom: 24px;
      }

      .sidebar-section h3 {
        font-size: 12px;
        color: var(--text-secondary);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 12px;
        font-weight: 600;
      }

      .input-group {
        margin-bottom: 16px;
      }

      .input-group label {
        display: block;
        font-size: 13px;
        color: var(--text-secondary);
        margin-bottom: 6px;
      }

      .input-group input {
        width: 100%;
        padding: 10px 12px;
        background: var(--bg-main);
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--text-primary);
        font-size: 14px;
        transition: all 0.2s;
      }

      .input-group input:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 2px rgba(16, 163, 127, 0.1);
      }

      .api-status {
        font-size: 12px;
        margin-top: 4px;
        display: flex;
        align-items: center;
        gap: 4px;
      }

      .api-status.valid {
        color: #10a37f;
      }

      .api-status.invalid {
        color: #ef4444;
      }

      .api-status.validating {
        color: #f59e0b;
      }

      .sidebar-footer {
        padding: 16px;
        border-top: 1px solid var(--border);
      }

      .theme-toggle-btn {
        width: 100%;
        padding: 10px 12px;
        background: transparent;
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--text-primary);
        font-size: 14px;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 8px;
        transition: all 0.2s;
      }

      .theme-toggle-btn:hover {
        background: var(--bg-tertiary);
      }

      /* Main Content */
      .main-content {
        flex: 1;
        display: flex;
        flex-direction: column;
        position: relative;
      }

      .chat-header {
        height: var(--header-height);
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        padding: 0 20px;
        background: var(--bg-main);
      }

      .menu-toggle {
        background: transparent;
        border: none;
        font-size: 20px;
        cursor: pointer;
        color: var(--text-primary);
        padding: 8px;
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
      }

      .menu-toggle:hover {
        background: var(--bg-secondary);
      }

      .chat-title {
        margin-left: 16px;
        font-size: 16px;
        font-weight: 600;
        color: var(--text-primary);
      }

      .chat-container {
        flex: 1;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
      }

      .chat-messages {
        flex: 1;
        padding: 20px;
        max-width: 800px;
        width: 100%;
        margin: 0 auto;
      }

      .message {
        display: flex;
        gap: 16px;
        margin-bottom: 24px;
        animation: fadeIn 0.3s ease;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .message-avatar {
        width: 32px;
        height: 32px;
        border-radius: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        font-size: 18px;
      }

      .message.user .message-avatar {
        background: #10a37f;
      }

      .message.assistant .message-avatar {
        background: #7c3aed;
      }

      .message-content {
        flex: 1;
        line-height: 1.6;
        color: var(--text-primary);
      }

      /* Input Area */
      .input-area {
        border-top: 1px solid var(--border);
        padding: 20px;
        background: var(--bg-main);
      }

      .input-container {
        max-width: 800px;
        margin: 0 auto;
        background: var(--bg-main);
        border: 1px solid var(--border);
        border-radius: 12px;
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .input-toolbar {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        border-bottom: 1px solid var(--border);
        background: var(--bg-secondary);
      }

      .model-selector {
        padding: 6px 10px;
        background: var(--bg-main);
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--text-primary);
        font-size: 12px;
        cursor: pointer;
        transition: all 0.2s;
      }

      .model-selector:hover {
        background: var(--bg-tertiary);
      }

      .model-selector:focus {
        outline: none;
        border-color: var(--primary);
      }

      .input-wrapper {
        display: flex;
        align-items: flex-end;
        padding: 12px;
        gap: 12px;
      }

      .input-wrapper textarea {
        flex: 1;
        min-height: 24px;
        max-height: 200px;
        padding: 0;
        background: transparent;
        border: none;
        color: var(--text-primary);
        font-size: 15px;
        font-family: inherit;
        resize: none;
        overflow-y: auto;
      }

      .input-wrapper textarea:focus {
        outline: none;
      }

      .send-button {
        background: var(--primary);
        color: white;
        border: none;
        width: 32px;
        height: 32px;
        border-radius: 6px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        transition: all 0.2s;
      }

      .send-button:hover:not(:disabled) {
        background: var(--primary-hover);
      }

      .send-button:disabled {
        background: var(--border);
        cursor: not-allowed;
        opacity: 0.5;
      }

      /* Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }

      ::-webkit-scrollbar-track {
        background: var(--bg-secondary);
      }

      ::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 4px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: var(--text-secondary);
      }

      /* Mobile Responsive */
      @media (max-width: 768px) {
        .sidebar {
          position: fixed;
          height: 100vh;
          z-index: 1000;
        }

        .sidebar.hidden {
          transform: translateX(-100%);
        }

        .main-content {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="app-container">
      <!-- Sidebar -->
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <button class="new-chat-btn" id="newChatBtn">
            <span>➕</span>
            <span>New Chat</span>
          </button>
        </div>

        <div class="sidebar-content">
          <div class="sidebar-section">
            <h3>Settings</h3>

            <div class="input-group">
              <label>API Key *</label>
              <input
                id="apiKeyInput"
                type="password"
                placeholder="Enter your Groq API key"
              />
              <div id="apiKeyStatus" class="api-status"></div>
            </div>
          </div>
        </div>

        <div class="sidebar-footer">
          <button class="theme-toggle-btn" id="themeToggle">
            <span id="themeIcon">🌙</span>
            <span id="themeText">Dark Mode</span>
          </button>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="main-content">
        <header class="chat-header">
          <button class="menu-toggle" id="menuToggle">☰</button>
          <h1 class="chat-title">ChatBot</h1>
        </header>

        <div class="chat-container" id="chatContainer">
          <div class="chat-messages" id="chatMessages">
            <div class="message assistant">
              <div class="message-avatar">🤖</div>
              <div class="message-content">
                Hello! How can I assist you today?
              </div>
            </div>
          </div>
        </div>

        <div class="input-area">
          <form id="chatForm" class="input-container">
            <div class="input-toolbar">
              <select id="modelSelect" class="model-selector">
                <option value="llama-3.3-70b-versatile">
                  Llama 3.3 70B Versatile
                </option>
                <option value="llama-3.1-8b-instant">
                  Llama 3.1 8B Instant
                </option>
                <option value="meta-llama/llama-4-maverick-17b-128e-instruct">
                  Llama 4 Maverick 17B
                </option>
                <option value="meta-llama/llama-4-scout-17b-16e-instruct">
                  Llama 4 Scout 17B
                </option>
                <option value="openai/gpt-oss-120b">GPT OSS 120B</option>
                <option value="qwen/qwen3-32b">Qwen 3 32B</option>
              </select>
            </div>
            <div class="input-wrapper">
              <textarea
                id="chatInput"
                placeholder="Type your message..."
                rows="1"
              ></textarea>
              <button type="submit" class="send-button" id="sendButton">
                ➤
              </button>
            </div>
          </form>
        </div>
      </main>
    </div>

    <script src="/static/app.js"></script>
  </body>
</html>
